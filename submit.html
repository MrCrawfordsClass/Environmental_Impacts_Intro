<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPS | Submit Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Public+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Public Sans', sans-serif; background: #283618; color: #fefae0; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { background: #606c38; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); max-width: 450px; text-align: center; border: 4px solid #bc6c25; }
        h1 { font-family: 'Archivo Black'; text-transform: uppercase; color: #fefae0; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        button { background: #bc6c25; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        a { color: #fefae0; text-decoration: none; font-size: 0.8rem; margin-top: 15px; display: block; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Report Upload</h1>
        <p>Submit your mission coordinates (project links) below.</p>
        <form>
            <input type="text" placeholder="Ranger Name(s)" required>
            <select>
                <option>Select Phase</option>
                <option>Phase 1: Detective Doc</option>
                <option>Phase 2: Architect Slides</option>
                <option>Phase 3: Final Action Plan</option>
            </select>
            <input type="url" placeholder="Paste Google/Canva Link" required>
            <button type="button" onclick="alert('Report Filed!')">Transmit Data</button>
        </form>
        <a href="index.html">← Return to Station</a>
    </div>
</body>
</html>
